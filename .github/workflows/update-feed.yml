name: Update OCGN Stock Feed

concurrency:
  group: ocgn-feed-update
  cancel-in-progress: true

on:
  schedule:
    # Run every 5 minutes, Monday through Friday only
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          # install required browser binaries for playwright
          python -m playwright install --with-deps chromium

      - name: Fetch OCGN stock data and generate feed
        run: |
          set -euo pipefail
          python fetch_stock_feed.py

          # If the script changed files (docs/feed.*), commit and push them.
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs || true
            git commit -m "Automated feed update: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"

            # Ensure we integrate any remote updates first to avoid push rejects.
            git fetch origin main
            git rebase origin/main || (git rebase --abort || true; git pull --rebase origin main || true)

            # Push with retries to handle transient race conditions.
            retries=0
            until [ $retries -ge 5 ]
            do
              git push origin HEAD:main && break
              retries=$((retries+1))
              echo "Push failed; retry #$retries after fetching and rebasing"
              sleep $((retries * 5))
              git fetch origin main
              git rebase origin/main || (git rebase --abort || true; git pull --rebase origin main || true)
            done
            if [ $retries -ge 5 ]; then
              echo "Failed to push after retries"
              exit 1
            fi
          else
            echo "No changes produced by feed generation."
          fi

      - name: Show emitted item count (from generated file)
        run: |
          echo "== Emitted items in docs/feed.rss =="
          grep -c "<item>" docs/feed.rss || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

  deploy:
    needs: update-feed
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
